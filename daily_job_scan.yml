name: Daily Data Jobs Scan

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug secrets presence
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          if [ -z "$GOOGLE_CREDENTIALS" ]; then
            echo "ERROR: GOOGLE_CREDENTIALS is empty or not set"
          else
            echo "OK: GOOGLE_CREDENTIALS is set (length: ${#GOOGLE_CREDENTIALS})"
          fi
          if [ -z "$SHEET_ID" ]; then
            echo "ERROR: SHEET_ID is empty or not set"
          else
            echo "OK: SHEET_ID is set"
          fi

      - name: Run job scanner
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python main.py

      - name: Commit updated seen_jobs.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.csv
          git diff --cached --quiet || git commit -m "chore: update seen_jobs.csv [$(date +'%Y-%m-%d')]"
          git push